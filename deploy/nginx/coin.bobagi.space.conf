# Reference copy of the LIVE nginx vhost for coin.bobagi.space.
# Live file: /etc/nginx/sites-available/coin.bobagi.space (symlinked into sites-enabled).
# After editing the live copy: nginx -t && systemctl reload nginx
#
# nginx serves the Coin Hub SPA static build and proxies the JSON API to the Go backend (:5020).

server {
    if ($host = coin.bobagi.space) { return 301 https://$host$request_uri; }
    listen 80;
    listen [::]:80;
    server_name coin.bobagi.space www.coin.bobagi.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name coin.bobagi.space www.coin.bobagi.space;

    ssl_certificate /etc/letsencrypt/live/coin.bobagi.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coin.bobagi.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers. HSTS is host-scoped (no includeSubDomains/preload) so other bobagi.space
    # subdomains are unaffected; "always" sends them on error responses too.
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root /opt/Coin-Alert/apps/web/dist;
    index index.html;

    location /api/ {
        proxy_pass http://127.0.0.1:5020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    # Brute-force protection on the credential endpoints (exact-match wins over the /auth/ prefix,
    # so /auth/me, /auth/providers and the Google flow are not throttled). The coin_login zone is
    # defined in conf.d/coin-hub-limit.conf (see deploy/nginx/coin-hub-limit.conf).
    location = /auth/login {
        limit_req zone=coin_login burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:5020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /auth/signup {
        limit_req zone=coin_login burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://127.0.0.1:5020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /auth/ {
        proxy_pass http://127.0.0.1:5020;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location = /health { proxy_pass http://127.0.0.1:5020; }

    location / { try_files $uri $uri/ /index.html; }
}
