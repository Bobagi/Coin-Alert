# Reference copy of the nginx vhost for coin.bobagi.space.
# The live file lives at /etc/nginx/sites-enabled/. After editing the live copy:
#   nginx -t && systemctl reload nginx
#
# Phase 0–3: nginx proxies everything to the Go API on :5020.
# Phase 4+:  split so that /api/* -> Go API (:5020) and /* -> SvelteKit web (:5030).

server {
    if ($host = coin.bobagi.space) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    listen [::]:80;
    server_name coin.bobagi.space www.coin.bobagi.space;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name coin.bobagi.space www.coin.bobagi.space;

    ssl_certificate /etc/letsencrypt/live/coin.bobagi.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/coin.bobagi.space/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Current: single Go API serves the app.
    location / {
        proxy_pass http://localhost:5020;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Phase 4+: uncomment to put SvelteKit in front and route the API under /api.
    # location /api/ {
    #     proxy_pass http://localhost:5020/;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }
    # location / {
    #     proxy_pass http://localhost:5030;
    #     proxy_set_header Host $host;
    # }
}
