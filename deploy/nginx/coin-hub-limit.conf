# Reference copy of /etc/nginx/conf.d/coin-hub-limit.conf
# Defines the rate-limit zone referenced by the coin.bobagi.space vhost (limit_req zone=coin_login).
# Must live in the http{} context (conf.d/*.conf is included there), not inside a server block.
#
# Brute-force protection on /auth/login and /auth/signup: 10 req/min per client IP.
limit_req_zone $binary_remote_addr zone=coin_login:10m rate=10r/m;
